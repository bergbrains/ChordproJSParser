name: CI

on:
  push:
    branches:
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1 (parallel): linting/formatting checks and unit tests
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Cache pre-commit hooks
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Clear pre-commit cache
        run: pre-commit clean

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  # Stage 2: build the JS bundle and assemble the Pages site
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ pre-commit, test ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build JS bundle
        run: npm run build

      - name: Assemble Pages site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R dist _site/dist
          cp -R examples _site/examples
          cp style.css _site/style.css
          cat <<'EOF' > _site/index.html
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./examples/basic.html">
              <title>ChordproJS Examples</title>
            </head>
            <body>
              <p>Redirecting to <a href="./examples/basic.html">the basic example</a>…</p>
            </body>
          </html>
          EOF

      - name: Smoke test site
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory _site >/tmp/chordpro-pages.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 20); do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 0.5
          done

          if ! curl --fail --silent --show-error http://127.0.0.1:4173/ >/dev/null; then
            echo "Timed out waiting for local HTTP server" >&2
            cat /tmp/chordpro-pages.log >&2 || true
            exit 1
          fi

          curl --fail --silent --show-error http://127.0.0.1:4173/examples/basic.html | grep -q 'ChordproJS Basic Example'
          curl --fail --silent --show-error http://127.0.0.1:4173/style.css >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:4173/dist/chordprojs.min.js >/dev/null

      # Upload the Pages artifact only on main so that GitHub does not
      # trigger an extra "pages build and deployment" run on every branch push.
      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./_site

  # Stage 3: deploy to GitHub Pages (main branch only)
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
