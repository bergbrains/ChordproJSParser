<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordproJS Notion Embed</title>
    <!-- 1. Include the ChordproJS library -->
    <!-- Replace with your own hosted URL or use a CDN as shown -->
    <!-- NOTE: Loading via file:// protocol may cause security errors. Use a local server for testing. -->
    <script src="./../../dist/chordprojs.min.js"></script>
    <style>
        /* Minimal styling for the embed */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: transparent; /* Allows Notion's background to show through if supported */
        }
        #plugin-root {
            max-width: 800px;
            margin: 0 auto;
        }
        /* ChordproJS CSS (Extracted from style.css) */
        .section { margin-bottom: 20px; padding-left: 10px; }
        .section-label { font-weight: bold; margin-bottom: 5px; color: #555; }
        .chorus { border-left: 4px solid #c00; }
        .verse { border-left: 4px solid #090; }
        .bridge { border-left: 4px solid #00c; }
        pre.chord-line { color: #c00; font-weight: bold; font-family: monospace; margin: 0; line-height: 1.1; }
        pre.lyric-line { margin: 0 0 8px 0; font-family: monospace; line-height: 1.1; }
        .comment { font-style: italic; color: gray; margin: 8px 0; }
    </style>
</head>
<body>
    <!-- 2. Target div for the plugin -->
    <div id="plugin-root">Loading song...</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const root = document.getElementById('plugin-root');

            // Example ChordPro content - this could be fetched from a URL parameter or an external API
            const chordproText = `
{title: Amazing Grace}
{subtitle: Traditional}

[G]Amazing [D]grace! How [G]sweet the [D]sound
That [G]saved a [D]wretch like [G]me!
            `;

            try {
                // 3. Initialize and render the plugin
                const chordpro = new ChordproJS();
                const html = chordpro.renderToHTML(chordproText);
                root.innerHTML = html;
            } catch (error) {
                console.error("Failed to render ChordPro:", error);
                root.innerHTML = "Error loading song.";
            }
        });
    </script>
</body>
</html>
